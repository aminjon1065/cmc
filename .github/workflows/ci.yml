name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

# Per-branch concurrency: a new push cancels in-flight runs on the same
# branch so the latest commit is the only one that finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  verify:
    name: Verify (format, lint, typecheck, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  migrations:
    name: Migrations + seed (against fresh Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # We can't use GitHub Actions' `services:` block here — our Postgres
      # image is built locally from infra/postgres/Dockerfile (PostGIS +
      # pgvector + init scripts). Build it then run by hand.
      - name: Build custom Postgres image
        run: docker build -t cmc-postgres:ci ./infra/postgres

      - name: Start Postgres (with init scripts mounted)
        run: |
          docker run -d --name cmc-postgres-ci \
            -e POSTGRES_USER=cmc \
            -e POSTGRES_PASSWORD=cmc_dev_password_change_me \
            -e POSTGRES_DB=cmc \
            -p 5432:5432 \
            -v "$PWD/infra/postgres/init:/docker-entrypoint-initdb.d:ro" \
            cmc-postgres:ci
          for i in {1..30}; do
            if docker exec cmc-postgres-ci pg_isready -U cmc -d cmc >/dev/null 2>&1; then
              echo "Postgres ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          docker logs cmc-postgres-ci
          exit 1

      - name: Build workspace packages required by migrate/seed
        run: pnpm --filter @cmc/contracts --filter @cmc/db build

      - name: Apply migrations
        env:
          DATABASE_OWNER_URL: postgresql://cmc:cmc_dev_password_change_me@localhost:5432/cmc
        run: pnpm --filter @cmc/db migrate

      - name: Schema sanity check
        run: |
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c "\dt"
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c \
            "SELECT count(*) AS policy_count FROM pg_policies WHERE schemaname='public';"
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c \
            "SELECT rolname, rolsuper, rolbypassrls FROM pg_roles WHERE rolname IN ('cmc', 'cmc_app');"

      - name: Run seed
        env:
          # Seed connects with the owner URL; the loadConfig validator
          # however still asserts every other URL is well-formed, so we
          # supply dummy-but-shaped values for the unused ones.
          DATABASE_URL: postgresql://cmc_app:cmc_app_dev_password_change_me@localhost:5432/cmc
          DATABASE_OWNER_URL: postgresql://cmc:cmc_dev_password_change_me@localhost:5432/cmc
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_PUBLIC_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY: ci-key
          S3_SECRET_KEY: ci-secret
          S3_BUCKET_FILES: cmc-files
          S3_FORCE_PATH_STYLE: "true"
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-characters
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL_SEC: "2592000"
          JWT_ISSUER: cmc
          DOCUMENTS_MAX_UPLOAD_BYTES: "104857600"
          DOCUMENTS_UPLOAD_URL_TTL_SEC: "300"
          DOCUMENTS_DOWNLOAD_URL_TTL_SEC: "300"
        run: pnpm --filter @cmc/api seed

      - name: Verify seeded rows
        run: |
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c "SELECT slug FROM tenants;"
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c "SELECT email FROM users;"

      - name: Tear down
        if: always()
        run: docker rm -f cmc-postgres-ci 2>/dev/null || true
