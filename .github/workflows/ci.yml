name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

# Per-branch concurrency: a new push cancels in-flight runs on the same
# branch so the latest commit is the only one that finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  verify:
    name: Verify (format, lint, typecheck, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  integration:
    name: Integration (migrations + seed + e2e tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # ---------- Postgres ----------
      # Custom image built from infra/postgres/Dockerfile (PostGIS +
      # pgvector + init scripts that create the cmc_app role on first
      # boot). Can't use GHA services: directly because services don't
      # accept a Dockerfile.
      - name: Build Postgres image
        run: docker build -t cmc-postgres:ci ./infra/postgres

      - name: Start Postgres
        run: |
          docker run -d --name cmc-postgres-ci \
            -e POSTGRES_USER=cmc \
            -e POSTGRES_PASSWORD=cmc_dev_password_change_me \
            -e POSTGRES_DB=cmc \
            -p 5432:5432 \
            -v "$PWD/infra/postgres/init:/docker-entrypoint-initdb.d:ro" \
            cmc-postgres:ci
          for i in {1..30}; do
            if docker exec cmc-postgres-ci pg_isready -U cmc -d cmc >/dev/null 2>&1; then
              echo "Postgres ready after ${i} attempts"; exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready"; docker logs cmc-postgres-ci; exit 1

      # ---------- MinIO ----------
      # Documents-lifecycle e2e tests do real PUT/GET against MinIO via
      # pre-signed URLs, so we run a real instance. Bucket is created
      # via mc to mirror the dev infra behaviour.
      - name: Start MinIO
        run: |
          docker run -d --name cmc-minio-ci \
            -e MINIO_ROOT_USER=cmc-admin \
            -e MINIO_ROOT_PASSWORD=cmc_dev_minio_change_me \
            -p 9000:9000 -p 9001:9001 \
            minio/minio:RELEASE.2024-12-18T13-15-44Z \
            server /data --console-address ":9001"
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null 2>&1; then
              echo "MinIO ready after ${i} attempts"; exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready"; docker logs cmc-minio-ci; exit 1

      - name: Create cmc-files bucket
        run: |
          docker run --rm --network host \
            -e MC_HOST_local=http://cmc-admin:cmc_dev_minio_change_me@localhost:9000 \
            minio/mc:RELEASE.2024-11-21T17-21-54Z \
            mb --ignore-existing local/cmc-files

      # ---------- Migrations + seed (against the cmc DB) ----------
      - name: Build workspace packages
        run: pnpm --filter @cmc/contracts --filter @cmc/db build

      - name: Apply migrations to cmc
        env:
          DATABASE_OWNER_URL: postgresql://cmc:cmc_dev_password_change_me@localhost:5432/cmc
        run: pnpm --filter @cmc/db migrate

      - name: Schema sanity (policies + roles)
        run: |
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c "\dt"
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c \
            "SELECT count(*) AS policy_count FROM pg_policies WHERE schemaname='public';"
          docker exec cmc-postgres-ci psql -U cmc -d cmc -c \
            "SELECT rolname, rolsuper, rolbypassrls FROM pg_roles WHERE rolname IN ('cmc', 'cmc_app');"

      - name: Seed
        env:
          DATABASE_URL: postgresql://cmc_app:cmc_app_dev_password_change_me@localhost:5432/cmc
          DATABASE_OWNER_URL: postgresql://cmc:cmc_dev_password_change_me@localhost:5432/cmc
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_PUBLIC_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY: cmc-admin
          S3_SECRET_KEY: cmc_dev_minio_change_me
          S3_BUCKET_FILES: cmc-files
          S3_FORCE_PATH_STYLE: "true"
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-characters
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL_SEC: "2592000"
          JWT_ISSUER: cmc
          DOCUMENTS_MAX_UPLOAD_BYTES: "104857600"
          DOCUMENTS_UPLOAD_URL_TTL_SEC: "300"
          DOCUMENTS_DOWNLOAD_URL_TTL_SEC: "300"
        run: pnpm --filter @cmc/api seed

      # ---------- API e2e tests (Jest creates and uses cmc_test) ----------
      - name: Provision .env.test for jest
        run: cp apps/api/.env.test.example apps/api/.env.test

      - name: Run API e2e tests
        run: pnpm --filter @cmc/api test

      # ---------- Web e2e tests (Playwright) ----------
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cmc/web exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cmc/web exec playwright install-deps chromium

      - name: Build apps/web for Playwright
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
        run: pnpm --filter @cmc/api --filter @cmc/web build

      - name: Run Playwright e2e tests
        env:
          # The same env Playwright's webServer block expects. Setting at
          # job level lets the config's `process.env.X ?? default` logic
          # pick these up (so Playwright config doesn't need a CI fork).
          DATABASE_URL: postgresql://cmc_app:cmc_app_dev_password_change_me@localhost:5432/cmc_test
          DATABASE_OWNER_URL: postgresql://cmc:cmc_dev_password_change_me@localhost:5432/cmc_test
          REDIS_URL: redis://localhost:6379
          S3_ENDPOINT: http://localhost:9000
          S3_PUBLIC_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY: cmc-admin
          S3_SECRET_KEY: cmc_dev_minio_change_me
          S3_BUCKET_FILES: cmc-files
          S3_FORCE_PATH_STYLE: "true"
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-characters
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL_SEC: "2592000"
          JWT_ISSUER: cmc
          DOCUMENTS_MAX_UPLOAD_BYTES: "104857600"
          DOCUMENTS_UPLOAD_URL_TTL_SEC: "300"
          DOCUMENTS_DOWNLOAD_URL_TTL_SEC: "300"
          AUTH_SECRET: ci-auth-secret-test-must-be-at-least-32-chars
          AUTH_TRUST_HOST: "true"
          API_BASE_URL: http://localhost:3001
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
          SEED_TENANT_SLUG: ci-default
          SEED_TENANT_NAME: CI Default
          SEED_ADMIN_EMAIL: admin@ci.local
          SEED_ADMIN_PASSWORD: ci_admin_pwd_change
          SEED_ADMIN_NAME: CI Admin
        run: pnpm --filter @cmc/web test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Tear down
        if: always()
        run: |
          docker rm -f cmc-postgres-ci cmc-minio-ci 2>/dev/null || true
