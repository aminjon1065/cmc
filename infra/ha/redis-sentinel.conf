# Redis Sentinel config sample (P3.13 / ADR-0058). Monitors the Redis master
# with a quorum of 2 (of 3 sentinels) to agree it's down before failover.
# Sentinel rewrites THIS file at runtime, so it's copied to a writable path by
# the container command (see docker-compose.ha.yml).
port 26379
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# monitor <name> <master-host> <master-port> <quorum>
sentinel monitor mymaster redis-master 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
sentinel parallel-syncs mymaster 1

# The master + replicas require a password (see docker-compose.ha.yml). Sentinel
# must know it to talk to them. CHANGE in production (env-substituted by your
# secret manager / Vault, not committed).
sentinel auth-pass mymaster cmc_dev_redis_change_me
