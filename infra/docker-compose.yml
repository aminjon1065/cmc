# Local development infrastructure for the CMC platform.
# Brings up Postgres (PostGIS + pgvector), Redis, and MinIO.
# Production deployment uses the same compose file with `infra/.env.production`.
#
# Usage (from repo root):
#   pnpm infra:up      # start
#   pnpm infra:down    # stop (data preserved)
#   pnpm infra:reset   # stop and delete volumes
#   pnpm infra:logs    # tail logs
#   pnpm infra:ps      # status

name: cmc

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: cmc/postgres:16-postgis-pgvector
    container_name: cmc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=500"

  redis:
    image: redis:7-alpine
    container_name: cmc-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: cmc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init container: creates default buckets in MinIO on first run.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: cmc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: ${MINIO_DEFAULT_BUCKETS}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for bucket in $$(echo "$$MINIO_DEFAULT_BUCKETS" | tr ',' ' '); do
          mc mb --ignore-existing "local/$$bucket"
          echo "Bucket ready: $$bucket"
        done
    restart: "no"

volumes:
  postgres_data:
    name: cmc-postgres-data
  redis_data:
    name: cmc-redis-data
  minio_data:
    name: cmc-minio-data

networks:
  default:
    name: cmc-net
