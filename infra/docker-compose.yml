# Local development infrastructure for the CMC platform.
# Brings up Postgres (PostGIS + pgvector), Redis, and MinIO.
# Production deployment uses the same compose file with `infra/.env.production`.
#
# Usage (from repo root):
#   pnpm infra:up      # start
#   pnpm infra:down    # stop (data preserved)
#   pnpm infra:reset   # stop and delete volumes
#   pnpm infra:logs    # tail logs
#   pnpm infra:ps      # status

name: cmc

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: cmc/postgres:16-postgis-pgvector
    container_name: cmc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=500"

  redis:
    image: redis:7-alpine
    container_name: cmc-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # NATS JetStream — the event plane (P2.1 / ADR-0031). `-js` enables
  # JetStream; `-sd` is the durable store dir; `-m` exposes the monitoring
  # port for the healthcheck. The outbox relay publishes here; consumers
  # subscribe to `tenant.{id}.{aggregate}.{event}.v{n}`.
  nats:
    image: nats:2.10-alpine
    container_name: cmc-nats
    restart: unless-stopped
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: cmc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init container: creates default buckets in MinIO on first run.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: cmc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: ${MINIO_DEFAULT_BUCKETS}
      # Audit Merkle-anchor bucket (P1.11b / ADR-0029) — created WITH Object Lock
      # (WORM) enabled; it cannot be enabled on an existing bucket.
      AUDIT_ANCHOR_BUCKET: ${AUDIT_ANCHOR_BUCKET:-cmc-audit-anchors}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for bucket in $$(echo "$$MINIO_DEFAULT_BUCKETS" | tr ',' ' '); do
          mc mb --ignore-existing "local/$$bucket"
          echo "Bucket ready: $$bucket"
        done
        mc mb --with-lock --ignore-existing "local/$$AUDIT_ANCHOR_BUCKET"
        echo "Lock bucket ready: $$AUDIT_ANCHOR_BUCKET"
    restart: "no"

  # Nightly pg_dump → MinIO sidecar. See infra/backup/ for the image build
  # context, backup.sh, restore.sh, and the ADR-0012 design.
  #
  # The cron loop runs inside this container; manual one-shots use:
  #   docker compose exec postgres-backup /usr/local/bin/backup.sh
  #   docker compose exec postgres-backup /usr/local/bin/restore.sh <key|latest>
  # or the pnpm aliases db:backup / db:restore.
  postgres-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: cmc/postgres-backup:16
    container_name: cmc-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-cmc-backups}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_SCHEDULE_CRON: ${BACKUP_SCHEDULE_CRON:-0 3 * * *}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-false}
      TZ: ${BACKUP_TZ:-UTC}

  # Dev mail sink (P1.6c / ADR-0024): catches ALL outgoing email and shows it
  # in a web UI — nothing leaves the host. Production points MAIL_* at a real
  # SMTP server instead. SMTP on 1025, web UI on http://localhost:8025.
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: cmc-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ClickHouse — analytical store (P2.5 / ADR-0033). Only the HTTP port (8123)
  # is published (the native 9000 collides with MinIO; @clickhouse/client uses
  # HTTP). The init SQL in clickhouse/init creates the schema on first start.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: cmc-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-cmc}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-cmc}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cmc_dev_clickhouse_change_me}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Durable workflows (P3.1 / ADR-0045). Temporal server (auto-setup creates its
  # schema in the existing Postgres — DBs `temporal` + `temporal_visibility`) and
  # the Web UI. The API's gated worker/client connect only when TEMPORAL_ENABLED.
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: cmc-temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    healthcheck:
      # The frontend binds to the container IP, not loopback — address it by the
      # service name (resolvable in-container), not 127.0.0.1.
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  temporal-ui:
    image: temporalio/ui:2.32.0
    container_name: cmc-temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"

  # Full-text search engine (P3.6 / ADR-0051). Single-node, security plugin off
  # (DEV ONLY). The API's gated indexer/search connect only when
  # OPENSEARCH_ENABLED; Postgres FTS remains the default search.
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: cmc-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # Secrets management (P2.14 / ADR-0044). DEV MODE ONLY: in-memory, auto-
  # unsealed, fixed root token — never for production (a prod Vault is HA, sealed,
  # with auto-unseal + AppRole/k8s auth). The API's in-process loader reads a KV
  # v2 secret here when VAULT_ENABLED=true; it is OFF by default so the stack runs
  # without Vault.
  vault:
    image: hashicorp/vault:1.15.6
    container_name: cmc-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-cmc_dev_vault_root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["server", "-dev"]
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # One-shot: seed the first secret (MFA_ENC_KEY) into KV v2 at secret/cmc/api.
  # In a real deploy the operator writes real values; here it writes the same
  # public dev key so VAULT_ENABLED=true is behaviourally identical to env.
  vault-init:
    image: hashicorp/vault:1.15.6
    container_name: cmc-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-cmc_dev_vault_root}
      MFA_ENC_KEY: ${MFA_ENC_KEY:-ZGV2LW1mYS1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISE=}
    entrypoint: ["sh", "-c"]
    command:
      - |
        vault kv put secret/cmc/api MFA_ENC_KEY="$$MFA_ENC_KEY" &&
        echo "seeded secret/cmc/api"
    restart: "no"

volumes:
  nats_data:
  clickhouse_data:
  opensearch_data:
  postgres_data:
    name: cmc-postgres-data
  redis_data:
    name: cmc-redis-data
  minio_data:
    name: cmc-minio-data

networks:
  default:
    name: cmc-net
