# Local development infrastructure for the CMC platform.
# Brings up Postgres (PostGIS + pgvector), Redis, and MinIO.
# Production deployment uses the same compose file with `infra/.env.production`.
#
# Usage (from repo root):
#   pnpm infra:up      # start
#   pnpm infra:down    # stop (data preserved)
#   pnpm infra:reset   # stop and delete volumes
#   pnpm infra:logs    # tail logs
#   pnpm infra:ps      # status

name: cmc

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: cmc/postgres:16-postgis-pgvector
    container_name: cmc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=500"

  redis:
    image: redis:7-alpine
    container_name: cmc-redis
    restart: unless-stopped
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--appendonly"
      - "yes"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: cmc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init container: creates default buckets in MinIO on first run.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: cmc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: ${MINIO_DEFAULT_BUCKETS}
      # Audit Merkle-anchor bucket (P1.11b / ADR-0029) — created WITH Object Lock
      # (WORM) enabled; it cannot be enabled on an existing bucket.
      AUDIT_ANCHOR_BUCKET: ${AUDIT_ANCHOR_BUCKET:-cmc-audit-anchors}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        for bucket in $$(echo "$$MINIO_DEFAULT_BUCKETS" | tr ',' ' '); do
          mc mb --ignore-existing "local/$$bucket"
          echo "Bucket ready: $$bucket"
        done
        mc mb --with-lock --ignore-existing "local/$$AUDIT_ANCHOR_BUCKET"
        echo "Lock bucket ready: $$AUDIT_ANCHOR_BUCKET"
    restart: "no"

  # Nightly pg_dump → MinIO sidecar. See infra/backup/ for the image build
  # context, backup.sh, restore.sh, and the ADR-0012 design.
  #
  # The cron loop runs inside this container; manual one-shots use:
  #   docker compose exec postgres-backup /usr/local/bin/backup.sh
  #   docker compose exec postgres-backup /usr/local/bin/restore.sh <key|latest>
  # or the pnpm aliases db:backup / db:restore.
  postgres-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: cmc/postgres-backup:16
    container_name: cmc-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-cmc-backups}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_SCHEDULE_CRON: ${BACKUP_SCHEDULE_CRON:-0 3 * * *}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-false}
      TZ: ${BACKUP_TZ:-UTC}

  # Dev mail sink (P1.6c / ADR-0024): catches ALL outgoing email and shows it
  # in a web UI — nothing leaves the host. Production points MAIL_* at a real
  # SMTP server instead. SMTP on 1025, web UI on http://localhost:8025.
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: cmc-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Secrets management (P2.14 / ADR-0044). DEV MODE ONLY: in-memory, auto-
  # unsealed, fixed root token — never for production (a prod Vault is HA, sealed,
  # with auto-unseal + AppRole/k8s auth). The API's in-process loader reads a KV
  # v2 secret here when VAULT_ENABLED=true; it is OFF by default so the stack runs
  # without Vault.
  vault:
    image: hashicorp/vault:1.15.6
    container_name: cmc-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-cmc_dev_vault_root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["server", "-dev"]
    ports:
      - "${VAULT_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # One-shot: seed the first secret (MFA_ENC_KEY) into KV v2 at secret/cmc/api.
  # In a real deploy the operator writes real values; here it writes the same
  # public dev key so VAULT_ENABLED=true is behaviourally identical to env.
  vault-init:
    image: hashicorp/vault:1.15.6
    container_name: cmc-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-cmc_dev_vault_root}
      MFA_ENC_KEY: ${MFA_ENC_KEY:-ZGV2LW1mYS1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISE=}
    entrypoint: ["sh", "-c"]
    command:
      - |
        vault kv put secret/cmc/api MFA_ENC_KEY="$$MFA_ENC_KEY" &&
        echo "seeded secret/cmc/api"
    restart: "no"

  # --- GeoServer — OGC GIS server (ADR-0079) ---
  # WMS/WFS/WMTS over PostGIS so QGIS, ArcGIS Pro + the web app share ONE GIS
  # source of truth. Connects with the least-privilege read-only `geoserver_ro`
  # DB role (SELECT-only on gis_*, BYPASSRLS for the single site). Front with
  # Caddy + real admin creds in production.
  geoserver:
    image: docker.osgeo.org/geoserver:2.26.1
    container_name: cmc-geoserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GEOSERVER_ADMIN_USER: ${GEOSERVER_ADMIN_USER:-admin}
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-cmc_dev_geoserver_admin_change_me}
      # Don't ship the sample data dir — we publish our own PostGIS layers.
      SKIP_DEMO_DATA: "true"
      # Allow the web app (and tooling) to call WMS/WFS cross-origin in dev.
      CORS_ENABLED: "true"
      # In prod set to the public path behind Caddy, e.g. https://<host>/geoserver
      # PROXY_BASE_URL: http://localhost:8088/geoserver
    ports:
      - "${GEOSERVER_PORT:-8088}:8080"
    volumes:
      - geoserver_data:/opt/geoserver_data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/geoserver/web/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  geoserver_data:
  postgres_data:
    name: cmc-postgres-data
  redis_data:
    name: cmc-redis-data
  minio_data:
    name: cmc-minio-data

networks:
  default:
    name: cmc-net
