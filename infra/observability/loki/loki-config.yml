# Loki — single-binary, filesystem-backed log store for the CMC platform
# (P1.7 / ADR-0025). Dev-scale: no auth, in-memory ring, 7-day retention.
# Production would swap the filesystem store for object storage (S3/MinIO).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h # 7 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# No phone-home.
analytics:
  reporting_enabled: false
