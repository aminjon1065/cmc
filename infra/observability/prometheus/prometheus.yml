# Prometheus scrape + alerting configuration for the CMC platform
# (P0.7 / ADR-0014, P1.8 / ADR-0026).

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: cmc-dev

# Alert rules (P1.8 / ADR-0026) — evaluated every `evaluation_interval`.
rule_files:
  - /etc/prometheus/rules/*.yml

# Push firing alerts to Alertmanager.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # The API runs on the host (not in compose until P0.10). host.docker.internal
  # is the Docker Desktop / extra_hosts alias for the host machine.
  - job_name: cmc-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: cmc-api

  # Prometheus scraping itself — cheap liveness + meta-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
