# LiveKit egress dev config (P4.2c / ADR-0061). DEV ONLY. Egress receives jobs
# from the LiveKit server via redis, joins the room headless, composites it, and
# uploads the MP4 to the S3 target supplied per-request by the API. Heavy
# (headless Chrome) → opt-in via the `egress` compose profile.
redis:
  address: redis:6379
api_key: devkey
api_secret: devsecret_change_me_minimum_32_chars
ws_url: ws://livekit:7880
insecure: true
log_level: info
