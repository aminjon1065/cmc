# LiveKit SFU dev config (P4.2 / ADR-0061). DEV ONLY — keys are public dev
# defaults that match the API's LIVEKIT_API_KEY / LIVEKIT_API_SECRET. In prod the
# operator supplies real keys (e.g. via Vault) and a TURN/TLS setup behind Caddy.
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # Dev/localhost: don't try to discover an external IP; the browser connects to
  # 127.0.0.1. coturn (below) handles relay for non-loopback peers.
  use_external_ip: false
keys:
  devkey: devsecret_change_me_minimum_32_chars
# Shared with the app redis. Required so the egress service (P4.2c, opt-in
# `egress` profile) can receive recording jobs dispatched by this server.
redis:
  address: redis:6379
# LiveKit's built-in TURN is off; coturn runs as a separate dev service.
turn:
  enabled: false
logging:
  level: info
