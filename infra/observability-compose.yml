# Observability stack for the CMC platform (P0.7 / ADR-0014).
#
# Prometheus scrapes the API's /metrics endpoint and Grafana renders the
# checked-in dashboards. This is a SEPARATE compose file from the core
# infra (infra/docker-compose.yml) so the metrics stack can be brought up
# / torn down independently:
#
#   pnpm obs:up      # start Prometheus + Grafana
#   pnpm obs:down    # stop (data preserved)
#   pnpm obs:logs    # tail
#   pnpm obs:reset   # stop + delete volumes
#
# The API itself runs on the HOST (pnpm dev / node dist/main.js), not in
# compose (app Dockerfiles land at P0.10). Prometheus therefore scrapes
# `host.docker.internal:3001` — the Docker Desktop alias for the host. On
# Linux, the `extra_hosts` mapping below makes that alias resolve too.
#
# Ports: Prometheus 9090, Grafana 3002 (host) — chosen to avoid the web
# app (3000), the API (3001), and MinIO (9000/9001).

name: cmc-obs

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cmc-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    extra_hosts:
      # Make host.docker.internal resolve on Linux (no-op on Docker
      # Desktop where it already resolves).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana-oss:11.2.2
    container_name: cmc-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      # Dev defaults — override in infra/.env for anything non-local.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # No sign-up, no anonymous access, no telemetry phone-home.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Log aggregation (P1.7 / ADR-0025). The host-run API ships its structured
  # pino logs here via the pino-loki transport (set LOKI_URL=http://localhost:3100
  # in apps/api/.env); Promtail (below) adds the infra containers' logs.
  loki:
    image: grafana/loki:3.2.1
    container_name: cmc-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # Scrapes cmc-* container stdout (postgres, redis, mailpit, …) into Loki.
  # The API is excluded (it self-ships via pino-loki); see promtail.yml.
  promtail:
    image: grafana/promtail:3.2.1
    container_name: cmc-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml"]
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Distributed tracing (P1.8 / ADR-0026). The host-run API exports OTLP here
  # when OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 (P0.6 already emits).
  # OTLP http 4318 / grpc 4317; query API 3200. `user: root` so Tempo can write
  # the named volume in dev (object storage in prod).
  tempo:
    image: grafana/tempo:2.6.1
    container_name: cmc-tempo
    restart: unless-stopped
    user: root
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"
      - "${TEMPO_OTLP_HTTP_PORT:-4318}:4318"
      - "${TEMPO_OTLP_GRPC_PORT:-4317}:4317"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # Alert routing (P1.8 / ADR-0026). Prometheus evaluates the rules and pushes
  # firing alerts here; Alertmanager dedupes/groups and routes them. UI on 9093.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cmc-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  prometheus_data:
    name: cmc-prometheus-data
  grafana_data:
    name: cmc-grafana-data
  loki_data:
    name: cmc-loki-data
  tempo_data:
    name: cmc-tempo-data
  alertmanager_data:
    name: cmc-alertmanager-data

networks:
  default:
    name: cmc-obs-net
